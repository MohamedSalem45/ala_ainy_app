name: ala_ainy_app
description: "Ala Ainy - Local Delivery and Shopping App"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # Utilities
  equatable: ^2.0.7
  dartz: ^0.10.1
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  fluttertoast: ^8.2.10
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  source_gen: ^2.0.0

flutter:
  uses-material-design: true
